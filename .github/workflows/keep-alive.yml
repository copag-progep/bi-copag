name: Keep Render alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://sei-bi-copag-andersoncfs-api.onrender.com/api/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "API online."
          else
            echo "API retornou $STATUS — pode estar inicializando."
          fi
