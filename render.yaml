databases:
  - name: sei-bi-copag-andersoncfs-db
    plan: free
    databaseName: sei_bi
    user: sei_bi_user
    region: virginia

services:
  - type: web
    name: sei-bi-copag-andersoncfs-api
    runtime: python
    plan: free
    region: virginia
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sei-bi-copag-andersoncfs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_NAME
        value: Anderson CFS
      - key: DEFAULT_ADMIN_EMAIL
        value: andersoncfs@ufc.br
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: AUTO_IMPORT_SAMPLE_DATA
        value: "false"
